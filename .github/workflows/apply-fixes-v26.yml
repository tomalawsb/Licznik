name: Apply Licznik v2.6 fixes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-fixes-v26.yml'

permissions:
  contents: write

jobs:
  apply-build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply source fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          VERSION = "2.6 - 1406261822"
          CODE = "20600"

          def replace_required(text, old, new, label):
              if old not in text:
                  raise SystemExit(f"Nie znaleziono fragmentu: {label}")
              return text.replace(old, new, 1)

          main_path = Path("app/src/main/java/pl/tomalawsb/licznik/MainActivity.java")
          main = main_path.read_text(encoding="utf-8")
          main = main.replace('public static final String VERSION_NAME = "2.5 - 0906261705";', f'public static final String VERSION_NAME = "{VERSION}";')
          main = main.replace('public static final String CURRENT_RELEASE_TAG = "v2.5-0906261705";', 'public static final String CURRENT_RELEASE_TAG = "v2.6-1406261822";')
          main = main.replace('public static final int CURRENT_VERSION_CODE = 20500;', f'public static final int CURRENT_VERSION_CODE = {CODE};')
          main = replace_required(main, "    private TextView primaryActionIcon, primaryActionLabel;\n    private LinearLayout primaryActionButton;\n    private RouteMapView routeView;", "    private TextView primaryActionIcon, primaryActionLabel;\n    private TextView headerModeIcon, speedHeroWatermark;\n    private LinearLayout primaryActionButton;\n    private RouteMapView routeView;", "pola ikon trybu")
          main = replace_required(main, "            String incomingMode = intent.getStringExtra(\"mode\");\n            if (incomingMode != null) selectedMode = incomingMode;", "            String incomingMode = intent.getStringExtra(\"mode\");\n            if (incomingMode != null && !incomingMode.equals(selectedMode)) {\n                selectedMode = incomingMode;\n                updateModeVisuals();\n            }", "aktualizacja trybu z serwisu")
          main = replace_required(main, "        TextView bikeIcon = circleText(\"🚲\", 46, Color.rgb(232, 247, 235), GREEN_DARK, 21);\n        bikeIcon.setElevation(dp(2));\n        bikeIcon.setOnClickListener(v -> chooseModeDialog());\n        header.addView(bikeIcon);", "        headerModeIcon = circleText(modeEmoji(), 46, Color.rgb(232, 247, 235), GREEN_DARK, 21);\n        headerModeIcon.setElevation(dp(2));\n        headerModeIcon.setOnClickListener(v -> chooseModeDialog());\n        header.addView(headerModeIcon);", "ikona nagłówka")
          main = replace_required(main, '        navRide = navItem("🚲\\nJazda", true);', '        navRide = navItem(modeEmoji() + "\\nJazda", true);', "ikona dolnego menu")
          main = replace_required(main, "        TextView watermark = text(\"🚲\", 120, Color.WHITE, true);\n        watermark.setAlpha(0.08f);\n        watermark.setGravity(Gravity.RIGHT | Gravity.CENTER_VERTICAL);\n        FrameLayout.LayoutParams wmLp = new FrameLayout.LayoutParams(-1, -1);\n        hero.addView(watermark, wmLp);", "        speedHeroWatermark = text(modeEmoji(), 120, Color.WHITE, true);\n        speedHeroWatermark.setAlpha(0.08f);\n        speedHeroWatermark.setGravity(Gravity.RIGHT | Gravity.CENTER_VERTICAL);\n        FrameLayout.LayoutParams wmLp = new FrameLayout.LayoutParams(-1, -1);\n        hero.addView(speedHeroWatermark, wmLp);", "znak wodny trybu")
          main = replace_required(main, "                    selectedMode = modes[which];\n                    prefs().edit().putString(\"last_mode\", selectedMode).apply();\n                    Toast.makeText(this, \"Wybrano: \" + selectedMode, Toast.LENGTH_SHORT).show();", "                    selectedMode = modes[which];\n                    prefs().edit().putString(\"last_mode\", selectedMode).apply();\n                    updateModeVisuals();\n                    Toast.makeText(this, \"Wybrano: \" + selectedMode, Toast.LENGTH_SHORT).show();", "odświeżenie ikony po wyborze")
          main = replace_required(main, "    private void updateNav() {\n        if (navRide == null) return;", "    private String modeEmoji() {\n        return \"Samochód\".equals(selectedMode) ? \"🚗\" : \"🚲\";\n    }\n\n    private void updateModeVisuals() {\n        String icon = modeEmoji();\n        if (headerModeIcon != null) headerModeIcon.setText(icon);\n        if (speedHeroWatermark != null) speedHeroWatermark.setText(icon);\n        if (navRide != null) navRide.setText(icon + \"\\nJazda\");\n    }\n\n    private void updateNav() {\n        if (navRide == null) return;", "metody aktualizacji ikon")
          main_path.write_text(main, encoding="utf-8")

          service_path = Path("app/src/main/java/pl/tomalawsb/licznik/RideTrackingService.java")
          service = service_path.read_text(encoding="utf-8")
          service = replace_required(service, "    private long lastNotificationUpdate = 0;\n\n    private final Handler tickHandler = new Handler(Looper.getMainLooper());\n    private final JSONArray points = new JSONArray();", "    private long lastNotificationUpdate = 0;\n    private long lastAverageCalculation = 0;\n    private double displayedAverageSpeedKmh = 0;\n    private boolean pointsChanged = true;\n    private String cachedPointsJson = \"[]\";\n\n    private final Handler tickHandler = new Handler(Looper.getMainLooper());\n    private final JSONArray points = new JSONArray();", "pola średniej i trasy")
          service = replace_required(service, "        else if (ACTION_SNAPSHOT.equals(action)) {\n            sendUpdate();\n            if (!running) stopSelf();\n        }", "        else if (ACTION_SNAPSHOT.equals(action)) {\n            pointsChanged = true;\n            sendUpdate();\n            if (!running) stopSelf();\n        }", "pełna trasa przy snapshot")
          service = replace_required(service, "        lastNotificationUpdate = 0;\n        while (points.length() > 0) points.remove(0);", "        lastNotificationUpdate = 0;\n        lastAverageCalculation = 0;\n        displayedAverageSpeedKmh = 0;\n        while (points.length() > 0) points.remove(0);\n        cachedPointsJson = \"[]\";\n        pointsChanged = true;", "reset średniej i trasy")
          service = replace_required(service, "            points.put(p);\n            while (points.length() > 800) points.remove(0);", "            points.put(p);\n            pointsChanged = true;", "usunięcie limitu 800 punktów")
          service = replace_required(service, "    private double getAverageSpeed() {\n        long elapsed = getElapsedMs();\n        if (elapsed <= 0) return 0;\n        return (distanceMeters / 1000.0) / (elapsed / 3600000.0);\n    }", "    private double calculateAverageSpeed() {\n        long elapsed = getElapsedMs();\n        if (elapsed <= 0) return 0;\n        return (distanceMeters / 1000.0) / (elapsed / 3600000.0);\n    }\n\n    private double getAverageSpeed() {\n        long now = SystemClock.elapsedRealtime();\n        if (lastAverageCalculation == 0 || now - lastAverageCalculation >= 1000) {\n            displayedAverageSpeedKmh = calculateAverageSpeed();\n            lastAverageCalculation = now;\n        }\n        return displayedAverageSpeedKmh;\n    }", "średnia raz na sekundę")
          service = replace_required(service, "        i.putExtra(\"accuracy\", (double) lastAccuracy);\n        i.putExtra(\"pointsJson\", points.toString());\n        i.putExtra(EXTRA_STOPPED, stopped);", "        i.putExtra(\"accuracy\", (double) lastAccuracy);\n        if (pointsChanged) {\n            cachedPointsJson = points.toString();\n            pointsChanged = false;\n            i.putExtra(\"pointsJson\", cachedPointsJson);\n        }\n        i.putExtra(EXTRA_STOPPED, stopped);", "wysyłanie trasy tylko po zmianie")
          service = replace_required(service, '            o.put("avg", getAverageSpeed());', '            o.put("avg", calculateAverageSpeed());', "dokładna średnia w historii")
          service_path.write_text(service, encoding="utf-8")

          gradle_path = Path("app/build.gradle")
          gradle = gradle_path.read_text(encoding="utf-8").replace("versionCode 20500", f"versionCode {CODE}").replace("versionName '2.5 - 0906261705'", f"versionName '{VERSION}'")
          gradle_path.write_text(gradle, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8").replace("Wersja: **2.5 - 0906261705**", f"Wersja: **{VERSION}**")
          readme += f"\n\n## Zmiany {VERSION}\n- Historia zachowuje trasę od rzeczywistego punktu startu; usunięto limit przesuwający początek po 800 punktach GPS.\n- Ikona w lewym górnym rogu zmienia się natychmiast między rowerem i samochodem.\n- Średnia prędkość jest odświeżana raz na sekundę.\n"
          readme_path.write_text(readme, encoding="utf-8")
          PY

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/pl/tomalawsb/licznik/MainActivity.java
          git add app/src/main/java/pl/tomalawsb/licznik/RideTrackingService.java
          git add app/build.gradle README.md
          git commit -m "Licznik Android v2.6 - 1406261822 poprawki trasy, ikon i średniej"
          git push origin HEAD:main

      - name: Build release APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="v2.6-1406261822"
          APK="app/build/outputs/apk/release/app-release.apk"
          OUT="Licznik-v2.6-1406261822.apk"
          cp "$APK" "$OUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$OUT" --clobber
          else
            gh release create "$TAG" "$OUT" --title "Licznik jazdy 2.6 - 1406261822" --notes "Poprawiono pełną historię trasy od punktu startu, dynamiczną ikonę roweru/samochodu oraz odświeżanie średniej prędkości raz na sekundę."
          fi
