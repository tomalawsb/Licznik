name: Build Android APK - Licznik 3.4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: licznik-v3.4-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ustaw Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Zbuduj APK release
        run: gradle assembleRelease

      - name: Przygotuj nazwany APK
        shell: bash
        run: |
          set -euo pipefail
          cp app/build/outputs/apk/release/app-release.apk Licznik-v3.4-2906261015.apk
          sha256sum Licznik-v3.4-2906261015.apk > SHA256SUMS-v3.4.txt

      - name: Udostepnij APK jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: Licznik-v3.4-2906261015-apk
          path: |
            Licznik-v3.4-2906261015.apk
            SHA256SUMS-v3.4.txt

      - name: Opublikuj lub zaktualizuj GitHub Release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="v3.4-2906261015"
          APK="Licznik-v3.4-2906261015.apk"
          TITLE="Licznik jazdy 3.4 - punkty POI pod kompasem"
          NOTES_TMP="${RUNNER_TEMP}/release-notes.txt"

          if [ -f "RELEASE_NOTES.md" ]; then
            cat "RELEASE_NOTES.md" > "$NOTES_TMP"
          else
            echo "Licznik jazdy 3.4 - punkty POI pod kompasem" > "$NOTES_TMP"
          fi

          printf '\n\nCommit: %s\n' "$GITHUB_SHA" >> "$NOTES_TMP"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber --repo "$GITHUB_REPOSITORY"
            gh release upload "$TAG" SHA256SUMS-v3.4.txt --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_TMP" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "$APK" SHA256SUMS-v3.4.txt \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file "$NOTES_TMP" \
              --repo "$GITHUB_REPOSITORY"
          fi
