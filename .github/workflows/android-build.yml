name: Automatyczna publikacja Licznik 3.1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: licznik-v3.1-publikacja
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Sprawdz APK
        shell: bash
        run: |
          set -euo pipefail
          test -f "Licznik-v3.1-1606260712.apk"
          sha256sum "Licznik-v3.1-1606260712.apk"

      - name: Opublikuj lub zaktualizuj GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="v3.1-1606260712"
          APK="Licznik-v3.1-1606260712.apk"
          TITLE="Licznik jazdy 3.1 - 1606260712"
          NOTES_TMP="${RUNNER_TEMP}/release-notes.txt"

          if [ -f "RELEASE_NOTES.md" ]; then
            cat "RELEASE_NOTES.md" > "$NOTES_TMP"
          else
            echo "Licznik jazdy 3.1 - 1606260712" > "$NOTES_TMP"
          fi

          printf '\n\nCommit: %s\n' "$GITHUB_SHA" >> "$NOTES_TMP"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_TMP" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "$APK" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file "$NOTES_TMP" \
              --repo "$GITHUB_REPOSITORY"
          fi
