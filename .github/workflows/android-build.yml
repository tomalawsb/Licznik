name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ustaw Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Zbuduj APK release
        run: gradle assembleRelease

      - name: Udostepnij APK jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: Licznik-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Opublikuj GitHub Release z APK
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v2.2-0906261554"
          APK="app/build/outputs/apk/release/app-release.apk"
          cp "$APK" "Licznik-v2.2-0906261554.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "Licznik-v2.2-0906261554.apk" --clobber
          else
            gh release create "$TAG" "Licznik-v2.2-0906261554.apk" --title "Licznik jazdy 2.2 - 0906261554" --notes "Pełna wersja Android release. Interaktywne pełnoekranowe mapy tras z historii i aktualnej jazdy, zoom/pan oraz dopasowanie trasy."
          fi
