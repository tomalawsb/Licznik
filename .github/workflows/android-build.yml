name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ustaw Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Zbuduj APK release
        run: gradle assembleRelease

      - name: Udostepnij APK jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: Licznik-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Opublikuj GitHub Release z APK
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v2.6-1406261822"
          APK="app/build/outputs/apk/release/app-release.apk"
          OUT="Licznik-v2.6-1406261822.apk"
          cp "$APK" "$OUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$OUT" --clobber
          else
            gh release create "$TAG" "$OUT" --title "Licznik jazdy 2.6 - 1406261822" --notes "Pełna wersja Android release. Poprawiono zachowanie całej trasy od punktu startu, zmianę ikony rower/samochód oraz odświeżanie średniej prędkości raz na sekundę."
          fi
