name: Build Android APK - Licznik 3.10.1

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: licznik-v3.10.1-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ustaw Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Zbuduj APK release
        run: gradle assembleRelease

      - name: Przygotuj nazwany APK
        shell: bash
        run: |
          set -euo pipefail
          cp app/build/outputs/apk/release/app-release.apk Licznik-v3.10.1-290626-tabs-fix.apk
          sha256sum Licznik-v3.10.1-290626-tabs-fix.apk > SHA256SUMS-v3.10.1.txt

      - name: Udostepnij APK jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: Licznik-v3.10.1-tabs-fix-apk
          path: |
            Licznik-v3.10.1-290626-tabs-fix.apk
            SHA256SUMS-v3.10.1.txt

      - name: Opublikuj GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.10.1-290626-tabs-fix
          name: Licznik jazdy 3.10.1 - naprawa zakładek i historii
          body_path: RELEASE_NOTES.md
          files: |
            Licznik-v3.10.1-290626-tabs-fix.apk
            SHA256SUMS-v3.10.1.txt
