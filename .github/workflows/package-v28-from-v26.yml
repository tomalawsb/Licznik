name: Package Licznik 2.8 from clean 2.6

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clean 2.6 branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Download verified 2.7 UI patch tools
        run: |
          mkdir -p tools
          curl --fail --location --retry 3 \
            https://raw.githubusercontent.com/tomalawsb/Licznik/main/tools/apply_ui_v27.py \
            --output tools/apply_ui_v27.py
          curl --fail --location --retry 3 \
            https://raw.githubusercontent.com/tomalawsb/Licznik/main/tools/compass_v27.b64 \
            --output tools/compass_v27.b64

      - name: Apply UI changes to clean 2.6 source
        run: python3 tools/apply_ui_v27.py

      - name: Upgrade generated project to 2.8 and repair update publishing
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          VERSION = '2.8 - 1406262143'
          TAG = 'v2.8-1406262143'
          CODE = '20800'

          main_path = Path('app/src/main/java/pl/tomalawsb/licznik/MainActivity.java')
          main = main_path.read_text(encoding='utf-8')
          main = re.sub(r'public static final String VERSION_NAME = ".*?";', f'public static final String VERSION_NAME = "{VERSION}";', main)
          main = re.sub(r'public static final String CURRENT_RELEASE_TAG = ".*?";', f'public static final String CURRENT_RELEASE_TAG = "{TAG}";', main)
          main = re.sub(r'public static final int CURRENT_VERSION_CODE = \d+;', f'public static final int CURRENT_VERSION_CODE = {CODE};', main)
          main_path.write_text(main, encoding='utf-8')

          gradle_path = Path('app/build.gradle')
          gradle = gradle_path.read_text(encoding='utf-8')
          gradle = re.sub(r'versionCode \d+', f'versionCode {CODE}', gradle)
          gradle = re.sub(r"versionName '.*?'", f"versionName '{VERSION}'", gradle)
          gradle_path.write_text(gradle, encoding='utf-8')

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          readme = re.sub(r'Wersja: \*\*.*?\*\*', f'Wersja: **{VERSION}**', readme, count=1)
          marker = f'## Zmiany {VERSION}'
          if marker not in readme:
              readme += f'''\n\n{marker}\n- Bazą jest sprawdzona wersja 2.6 z commita d59d9b5.\n- Dodano kompas PNG z rzeczywistym kanałem alfa.\n- Przesunięto główną prędkość wyżej.\n- Powiększono tekst średniej i maksymalnej prędkości.\n- Usunięto ostatnie jazdy z ekranu głównego.\n- Powiększono mapę i panel sterowania.\n- Po otwarciu aktualnej mapy ostatnia lokalizacja jest wyśrodkowana.\n- Naprawiono publikowanie aktualizacji jako Release 2.8.\n'''
          readme_path.write_text(readme, encoding='utf-8')

          workflow = '''name: Build Android APK

          on:
            push:
              branches: [ main ]
            workflow_dispatch:

          permissions:
            contents: write

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Pobierz repozytorium
                  uses: actions/checkout@v4

                - name: Ustaw Java 17
                  uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: '17'

                - name: Ustaw Gradle
                  uses: gradle/actions/setup-gradle@v4
                  with:
                    gradle-version: '8.7'

                - name: Zbuduj APK release
                  run: gradle assembleRelease

                - name: Udostepnij APK jako artifact
                  uses: actions/upload-artifact@v4
                  with:
                    name: Licznik-v2.8-1406262143-apk
                    path: app/build/outputs/apk/release/app-release.apk

                - name: Opublikuj GitHub Release z APK
                  if: github.ref == 'refs/heads/main'
                  env:
                    GH_TOKEN: ${{ github.token }}
                  run: |
                    TAG="v2.8-1406262143"
                    APK="app/build/outputs/apk/release/app-release.apk"
                    OUT="Licznik-v2.8-1406262143.apk"
                    cp "$APK" "$OUT"
                    if gh release view "$TAG" >/dev/null 2>&1; then
                      gh release upload "$TAG" "$OUT" --clobber
                    else
                      gh release create "$TAG" "$OUT" \
                        --title "Licznik jazdy 2.8 - 1406262143" \
                        --notes "Wersja 2.8 zbudowana na stabilnej bazie 2.6: nowy interfejs, kompas, większa mapa, centrowanie lokalizacji i naprawiony mechanizm aktualizacji."
                    fi
          '''
          workflow = '\n'.join(line[10:] if line.startswith('          ') else line for line in workflow.splitlines()) + '\n'
          workflow_path = Path('.github/workflows/android-build.yml')
          workflow_path.write_text(workflow, encoding='utf-8')

          report = f'''LICZNIK JAZDY {VERSION}\n\nBAZA: wersja 2.6, commit d59d9b584cf8747d2821584f2c301d246d1274ac\nWERSJA: {VERSION}\nVERSION CODE: {CODE}\nRELEASE TAG: {TAG}\nAPK: Licznik-v2.8-1406262143.apk\n\nPaczka zawiera kompletny projekt Android, a nie skrypt nakładkowy.\n'''
          Path('RAPORT_WERSJI_2.8.txt').write_text(report, encoding='utf-8')
          PY

      - name: Validate version, update workflow and PNG transparency
        run: |
          grep -q 'VERSION_NAME = "2.8 - 1406262143"' app/src/main/java/pl/tomalawsb/licznik/MainActivity.java
          grep -q 'CURRENT_RELEASE_TAG = "v2.8-1406262143"' app/src/main/java/pl/tomalawsb/licznik/MainActivity.java
          grep -q 'CURRENT_VERSION_CODE = 20800' app/src/main/java/pl/tomalawsb/licznik/MainActivity.java
          grep -q 'versionCode 20800' app/build.gradle
          grep -q "versionName '2.8 - 1406262143'" app/build.gradle
          grep -q 'TAG="v2.8-1406262143"' .github/workflows/android-build.yml
          grep -q 'OUT="Licznik-v2.8-1406262143.apk"' .github/workflows/android-build.yml
          test -f app/src/main/res/drawable-nodpi/compass_north.png
          python3 - <<'PY'
          from pathlib import Path
          data = Path('app/src/main/res/drawable-nodpi/compass_north.png').read_bytes()
          if data[:8] != b'\x89PNG\r\n\x1a\n':
              raise SystemExit('Kompas nie jest plikiem PNG')
          color_type = data[25]
          if color_type not in (4, 6):
              raise SystemExit(f'PNG nie ma kanału alfa, color_type={color_type}')
          print('PNG ma prawdziwy kanał alfa.')
          PY

      - name: Build release APK
        run: gradle assembleRelease

      - name: Prepare complete source package
        run: |
          rm -rf tools
          rm -f .github/workflows/package-v28-from-v26.yml
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/Licznik-v2.8-1406262143.apk
          zip -r dist/Licznik_2.8_KOMPLETNY_PROJEKT.zip . \
            -x '.git/*' '.gradle/*' 'build/*' 'app/build/*' 'dist/*' '*.iml' '.idea/*'

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: Licznik-2.8-kompletna-paczka
          path: |
            dist/Licznik_2.8_KOMPLETNY_PROJEKT.zip
            dist/Licznik-v2.8-1406262143.apk
