name: Apply Licznik v2.7 UI update

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/apply-ui-v27.yml'

permissions:
  contents: write

jobs:
  apply-build-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Apply UI and compass changes
        run: python3 tools/apply_ui_v27.py

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/pl/tomalawsb/licznik/MainActivity.java
          git add app/src/main/java/pl/tomalawsb/licznik/RouteMapView.java
          git add app/src/main/res/drawable-nodpi/compass_north.png
          git add app/build.gradle README.md .github/workflows/android-build.yml
          git commit -m "Licznik Android v2.7 - 1406262027 nowy interfejs i kompas"
          git push origin HEAD:main

      - name: Build release APK
        run: gradle assembleRelease

      - name: Prepare source package
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/Licznik-v2.7-1406262027.apk
          zip -r dist/Licznik-v2.7-1406262027-source.zip . -x '.git/*' 'app/build/*' '.gradle/*' 'dist/*'

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Licznik-v2.7-1406262027-paczka
          path: |
            dist/Licznik-v2.7-1406262027.apk
            dist/Licznik-v2.7-1406262027-source.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v2.7-1406262027"
          APK="dist/Licznik-v2.7-1406262027.apk"
          ZIP="dist/Licznik-v2.7-1406262027-source.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK" "$ZIP" --clobber
          else
            gh release create "$TAG" "$APK" "$ZIP" --title "Licznik jazdy 2.7 - 1406262027" --notes "Powiększona mapa, usunięte ostatnie przejazdy z ekranu głównego, większe statystyki i przyciski, kompas północy oraz centrowanie powiększonej mapy na bieżącej lokalizacji."
          fi
